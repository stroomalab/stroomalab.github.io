backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:

  # =========================
  # PEOPLE PAGE: PI
  # =========================
  - name: "pi_data"
    label: "PI"
    files:
      - name: "pi"
        label: "Principal Investigator"
        file: "content/people/pi.json"
        format: "json"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
          - { label: "Citizenship", name: "citizenship", widget: "string", required: false }
          - { label: "Photo", name: "avatar", widget: "image", required: false }
          - { label: "Biosketch", name: "summary", widget: "text", required: false }

          - label: "Education"
            name: "education"
            widget: "list"
            required: false
            fields:
              - { label: "Degree", name: "degree", widget: "string", required: false }
              - { label: "Institution", name: "institution", widget: "string", required: false }

          - label: "Links"
            name: "links"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "href", widget: "string" }

  # =========================
  # PEOPLE PAGE: MEMBERS LIST
  # =========================
  - name: "people_data"
    label: "People"
    files:
      - name: "people"
        label: "People list"
        file: "content/people/people.json"
        format: "json"
        fields:
          - label: "people"
            name: "people"
            widget: "list"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "ID (must match data-person)", name: "id", widget: "string" }

              - label: "Group"
                name: "group"
                widget: "select"
                options:
                  - { label: "Postdoctoral researchers", value: "postdoc" }
                  - { label: "Graduate students", value: "grad" }
                  - { label: "Associated profiles", value: "assoc" }

              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Citizenship", name: "citizenship", widget: "string", required: false }
              - { label: "Research area", name: "area", widget: "string", required: false }
              - { label: "Photo", name: "avatar", widget: "image", required: false }
              - { label: "Summary", name: "summary", widget: "text", required: false }

              - label: "Education"
                name: "education"
                widget: "list"
                required: false
                fields:
                  - { label: "Degree", name: "degree", widget: "string", required: false }
                  - { label: "Institution", name: "institution", widget: "string", required: false }

              - label: "Links"
                name: "links"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "href", widget: "string" }

  # =========================
  # PEOPLE PAGE: PAST MEMBERS
  # =========================
  - name: "past_members_data"
    label: "Past Members"
    files:
      - name: "past_members"
        label: "Past members table"
        file: "content/people/past_members.json"
        format: "json"
        fields:
          - label: "past_members"
            name: "past_members"
            widget: "list"
            summary: "{{fields.name_role_year}}"
            fields:
              - { label: "Name (role), year", name: "name_role_year", widget: "string" }
              - { label: "Current position", name: "current_position", widget: "string" }

  # =========================
  # PEOPLE PAGE: GALLERY
  # =========================
  - name: "gallery_data"
    label: "Group Pictures"
    files:
      - name: "gallery"
        label: "Gallery images"
        file: "content/people/gallery.json"
        format: "json"

        media_folder: "assets/gallery"
        public_folder: "/assets/gallery"

        fields:
          - label: "images"
            name: "images"
            widget: "list"
            fields:
              - { label: "Image file", name: "src", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string", required: false }
              - { label: "Alt text", name: "alt", widget: "string", required: false }